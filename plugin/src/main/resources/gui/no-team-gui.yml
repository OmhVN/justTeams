#───────────────────────────────────────────────────────────────────────────────

no-team-gui:
  title: "ᴛᴇᴀᴍ ᴍᴇɴᴜ"
  size: 27
  items:
    create-team:
      slot: 12
      enabled: true
      material: WRITABLE_BOOK
      name: "<gradient:#4C9DDE:#4C96D2>ᴄʀᴇᴀᴛᴇ ᴀ ᴛᴇᴀᴍ</gradient>"
      lore:
      - "<gray>Tự lập đội của riêng bạn và mời bạn bè!</gray>"
      - ""
      - "<yellow>Nhấp để bắt đầu quá trình tạo đội.</yellow>"
    leaderboards:
      slot: 14
      enabled: true
      material: EMERALD
      name: "<gradient:#4C9DDE:#4C96D2>ᴠɪᴇᴡ ʟᴇᴀᴅᴇʀʙᴏᴀʀᴅs</gradient>"
      lore:
      - "<gray>Xem các đội hàng đầu trên máy chủ.</gray>"
      - ""
      - "<yellow>Nhấp để xem bảng xếp hạng.</yellow>"
  # ═══════════════════════════════════════════════════════════════════════════
  # CUSTOM DUMMY ITEMS - Decorative items with no click functionality
  # ═══════════════════════════════════════════════════════════════════════════
