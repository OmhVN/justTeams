# Available placeholders: <player>, <prefix>, <player_prefix>, <suffix>, <player_suffix>, <team_name>, <team_tag>, <team_color>, <message>
# <prefix> and <player_prefix> show the player's permission group prefix (requires Vault + LuckPerms/PermissionsEx)
# <team_color> shows the opening gradient/color tag (e.g., "<gradient:#FF0000:#00FF00>" or "<red>")
# <team_color_close> shows the closing gradient tag (e.g., "</gradient>" or empty for solid colors)
# <team_tag> shows the team's tag
# <team_name> shows the team's name
# PlaceholderAPI placeholders work too:
#   %justteams_colored_tag% - tag with gradient/color applied automatically
#   %justteams_display% - full team display with icons and colors
# 
# GRADIENT EXAMPLE (works with /team setcolor #hex #hex):
