# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  justTeams · config.yml                                                  ║
# ║                                                                          ║
# ║  Main plugin settings: teams, creation, bank, homes, warps, cross-server ║
# ║  sync and performance. Every option is documented below.                 ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# Configuration version - DO NOT MODIFY
config-version: 31

# ────────────────────────────────────────────────────────────────────────────
#                         Proxy Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Configure cross-server functionality for network setups.
# Supports BungeeCord, Velocity, and Waterfall proxies.
#
proxy_settings:
  # Proxy type selection
  # Options: "NONE", "BUNGEE", "VELOCITY"
  type: "NONE"

# ────────────────────────────────────────────────────────────────────────────
#                        Database Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Choose your preferred storage method for team data.
# H2 is recommended for single servers, MySQL for networks.
#
storage:
  # Database type: "h2", "mysql", "mariadb"
  type: "h2"

  # MySQL/MariaDB Settings
  mysql:
    host: "localhost"
    port: 3306
    database: "username"
    username: "root"
    password: ""
    
    # Connection security
    use_ssl: false
    allow_public_key_retrieval: true
    use_unicode: true
    character_encoding: "utf8mb4"
    collation: "utf8mb4_unicode_ci"
    
    # Connection timeouts (milliseconds)
    connection_timeout: 30000
    socket_timeout: 60000
    auto_reconnect: true
    fail_over_read_only: false
    max_reconnects: 3

    # Connection Pool Settings (Optimized for both H2 and MySQL)
  connection_pool:
    # H2 defaults: max_size=4, min_idle=1
    # MySQL defaults: max_size=10, min_idle=3  
    max_size: 10
    min_idle: 3
    
    # Timeouts in milliseconds
    idle_timeout: 300000          # 5 minutes
    max_lifetime: 1800000         # 30 minutes
    connection_timeout: 30000     # 30 seconds (match MySQL timeout)
    validation_timeout: 5000      # 5 seconds
    
    # Connection testing
    connection_test_query: "SELECT 1"
    
    # Leak detection (0 = disabled, >0 = milliseconds before leak warning)
    leak_detection_threshold: 0

# ────────────────────────────────────────────────────────────────────────────
#                         Redis Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Redis provides instant cross-server messaging (< 100ms latency).
# When enabled, Redis handles real-time updates while MySQL stores data.
# If Redis fails, the plugin automatically falls back to MySQL polling.
#
redis:
  # Enable Redis for instant cross-server communication
  # Set to 'false' to use only MySQL (1-second polling)
  enabled: false
  
  # Redis server connection details
  host: "localhost"
  port: 6379
  
  # Authentication (leave empty if not required)
  password: ""
  
  # SSL/TLS encryption for Redis connection
  use_ssl: false
  
  # Connection timeout in milliseconds
  # Lower values fail faster, higher values tolerate network delays
  timeout: 5000
  
  # Connection pool settings
  pool:
    # Maximum total connections in pool
    max_total: 20
    
    # Maximum idle connections to keep open
    max_idle: 10
    
    # Minimum idle connections to maintain
    min_idle: 2

# ────────────────────────────────────────────────────────────────────────────
#                        Feature Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Enable or disable specific features to customize functionality.
# Each feature can be toggled independently.
#
features:
  # Core Team Management
  team_creation: true
  team_disband: true
  team_invites: true
  team_join_requests: true
  team_blacklist: true
  team_transfer: true
  team_public_toggle: true
  team_rename: true
  
  # Member Management
  member_kick: true
  member_promote: true
  member_demote: true
  member_leave: true
  
  # Information Features
  team_info: true
  team_tag: true
  team_description: true
  team_leaderboard: true
  
  # Home System
  team_home: true
  team_home_set: true
  team_home_teleport: true
  
  # Warp System
  team_warps: true
  team_warp_set: true
  team_warp_delete: true
  team_warp_teleport: true
  
  # PvP Features
  team_pvp: true
  team_pvp_toggle: true
  
  # Economy Features (Requires Vault)
  team_bank: true
  team_bank_deposit: true
  team_bank_withdraw: true
  
  # Storage Features
  team_enderchest: true
  
  # Communication Features
  team_chat: true
  team_message_command: true
  
  # Visual Features
  team_glow: true
  
  # Cross-Server Display
  show_cross_server_status: true

# ────────────────────────────────────────────────────────────────────────────
#                          General Settings
# ────────────────────────────────────────────────────────────────────────────
#
# Core plugin settings affecting overall behavior.
#
settings:
  # Debug Options
  debug: false
  
  # Server Configuration
  # single_server_mode: Set to true if you have only ONE server
  #   - Disables cross-server features for better performance
  #   - Use with H2 database for standalone servers
  # Set to false for multi-server networks with MySQL
  single_server_mode: true
  
  # server-identifier: Unique name for this server in your network
  #   - Must be different for each server (e.g., "survival", "creative", "lobby")
  #   - Only used when single_server_mode is false
  #   - Used to track which server players are on
  server-identifier: "survival"
  
  # Theme Colors
  main_color: "#4C9DDE"
  accent_color: "#FFD700"
  currency_format: ""
  
  # Team Glow Settings
  # owner: Dark Red (DARK_RED)
  # co_owner: Red (RED) - optional, falls back to mod if not set or similar
  # mod: Dark Green (DARK_GREEN)
  # member: White (WHITE)
  glow:
    enabled: true
    colors:
      owner: "DARK_RED"
      co_owner: "RED"
      mod: "DARK_GREEN"
      member: "WHITE"
    # If true, you can only see the glow of your OWN team members.
    # If false, you see everyone's glow (if they are in a team).
    only_show_own_team: true
    # Maximum distance (in blocks) to see the glow. Default: 30
    range: 30
    # Interval (in ticks) to check for glow updates. Default: 20 (1 second)
    check_interval: 20

  # Show in-game notification to admins when PacketEvents is missing
  # Set to false to disable the in-game reminder
  notify-missing-packetevents: true

  # --- bStats Metrics ---
  # bStats collects some anonymous data for plugin authors like server version, number of players, etc.
  # To see what data is collected, go to https://bstats.org/what-is-collected/
  # You can disable this here if you wish.
  bstats:
    enabled: true

  # --- FastStats Metrics ---
  # FastStats provides detailed plugin analytics and error tracking.
  # See https://faststats.dev/ for more information.
  # You can disable this here if you wish.
  faststats:
    enabled: true

  # Team Limits
  max_team_size: 10

  # Permission-based team sizes
  # Permission format: justteams.team.size.<number>
  # The highest permission value will be used
  # If disabled or no permission found, uses max_team_size above
  permission_based_team_size: true

  min_name_length: 3
  max_name_length: 16
  max_tag_length: 6
  max_description_length: 64

  allow_formatting_codes: true
  blocked_formatting_codes:
    - "&k"
    - "&l"
    - "&m"
    - "&n"
    - "&o"

  rename_cooldown: 604800

  default_pvp_status: true
  default_public_status: false

  # Team Creation Settings
  creation:
    require_color: false
    default_color: "<white>"
    use_gui_color_selection: false
    tag_optional: false
    # Allow spaces in team names. When true, /team create <tag> <name> lets the name contain spaces
    # (e.g. "The Salty Crew"). When false, names must be a single word (letters, digits, underscore).
    # The tag always comes first either way, and teams can be referenced by their tag.
    allow_spaces_in_name: true

  # Cross-Server Synchronization (requires single_server_mode: false and MySQL)
  enable_cross_server_sync: false

  sync_optimization:
    heartbeat_interval: 600
    cross_server_sync_interval: 3
    critical_sync_interval: 1
    max_teams_per_batch: 100
    enable_lazy_loading: true
    team_cache_ttl: 1200
    enable_optimistic_locking: true
    max_sync_retries: 2
    sync_retry_delay: 1000
    max_batch_size: 500
    cache_cleanup_interval: 900
    async_database_operations: true
    bulk_operation_batch_size: 200
    connection_validation_interval: 60
    heartbeat_batch_size: 1
    enable_connection_pooling: true

  performance:
    enable_metrics: false
    log_slow_queries: true
    slow_query_threshold: 50
    detailed_sync_logging: false
    monitor_connection_pool: false
    connection_pool_log_interval: 60
    enable_debug_logging: false
    gui_update_throttle_ms: 100
    max_concurrent_db_operations: 5

# ────────────────────────────────────────────────────────────────────────────
#                        Team Tier Upgrade System
# ────────────────────────────────────────────────────────────────────────────
#
# Teams start at tier 1 and can spend bank money to progress through
# tiers. Each tier unlocks larger teams, a bigger ender chest, and
# small combat perks.
#
# Security guarantees (enforced in code, NOT just config):
#   - damage_bonus_percent is hard capped at 15% regardless of config
#   - max_members hard cap is 100
#   - enderchest_rows hard cap is 6 (Minecraft limit)
#   - home_cooldown_reduction_percent hard cap is 75%
#   - max tier hard cap is 10
#
# Only the team OWNER can purchase upgrades. Upgrades deduct from the
# team bank. Skipping tiers is not allowed - each upgrade steps +1.
# ────────────────────────────────────────────────────────────────────────────
team_upgrades:
  # Set to false to disable tier upgrades entirely. When disabled:
  #   - All teams stay at tier 1 with base stats
  #   - The Upgrades button is hidden in the team GUI
  #   - Ender chest falls back to settings.team_ender_chest.rows
  #   - Max team size falls back to settings.max_team_size / permissions
  enabled: true

  tiers:
    1:
      # Tier 1 is the starting tier. Cost is ignored (you start here for free).
      max_members: 10
      enderchest_rows: 3
      damage_bonus_percent: 0
      home_cooldown_reduction_percent: 0
      cost: 0
    2:
      max_members: 12
      enderchest_rows: 4
      damage_bonus_percent: 1
      home_cooldown_reduction_percent: 10
      cost: 10000
    3:
      max_members: 15
      enderchest_rows: 5
      damage_bonus_percent: 2
      home_cooldown_reduction_percent: 20
      cost: 50000
    4:
      max_members: 20
      enderchest_rows: 6
      damage_bonus_percent: 3
      home_cooldown_reduction_percent: 30
      cost: 150000
    5:
      max_members: 25
      enderchest_rows: 6
      damage_bonus_percent: 5
      home_cooldown_reduction_percent: 50
      cost: 500000

# ────────────────────────────────────────────────────────────────────────────
#                        Team PvP Settings
# ────────────────────────────────────────────────────────────────────────────
team_pvp:
  # Cooldown in seconds between PvP status toggles (per team)
  # Set to 0 to disable the cooldown
  # Bypass with justteams.bypass.pvp.cooldown permission
  toggle_cooldown: 300

  # Disable flight when a player takes damage from another player
  # Applies to all players, not just team members
  # Works with both elytra and creative/gamemode fly
  disable_fly_on_combat: false

# ────────────────────────────────────────────────────────────────────────────
#                        Broadcast Settings
# ────────────────────────────────────────────────────────────────────────────
#
# Control server-wide announcements for team events.
#
broadcasts:
  team-created: true
  team-disbanded: true

# ────────────────────────────────────────────────────────────────────────────
#                        Team Chat Settings
# ────────────────────────────────────────────────────────────────────────────
#
# Configure the team chat system.
# When character_enabled is true, players can prefix messages with the character to send team chat
# Set character to a symbol like "#" or "!" 
# IMPORTANT: Never leave character empty ("") as it will capture ALL messages!
#
team_chat:
  character_enabled: true
  character: "#"  # Use # prefix for team chat (e.g., "#hello team")
  require_space: false  # If true, requires space after character (e.g., "# hello team")

# ────────────────────────────────────────────────────────────────────────────
#                        Home Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Configure team home teleportation system.
#
team_home:
  warmup_seconds: 5
  cooldown_seconds: 300

# ────────────────────────────────────────────────────────────────────────────
#                        Warp Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Configure the team warp system.
#
team_warps:
  max_warps: 5
  warmup_seconds: 5
  cooldown_seconds: 300

# ────────────────────────────────────────────────────────────────────────────
#                        Bank Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Configure the team banking system (requires Vault).
#
team_bank:
  enabled: true
  max_balance: 1000000.0

# ────────────────────────────────────────────────────────────────────────────
#                     Ender Chest Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Configure the shared team ender chest.
#
team_enderchest:
  enabled: true
  rows: 3

# ────────────────────────────────────────────────────────────────────────────
#                      Team Allies Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Configure the team alliance system.
# Allows teams to form alliances with other teams.
#
team_allies:
  enabled: true
  max_allies: 10
  # Allow teams to toggle accepting join requests
  allow_request_toggle: true

# ────────────────────────────────────────────────────────────────────────────
#                    World Restrictions Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Configure per-world feature restrictions.
# Features can be disabled in specific worlds to prevent abuse.
#
# Available features to restrict:
#   - sethome: Prevents setting team home in specified worlds
#   - setwarp: Prevents creating team warps in specified worlds
#   - home: Prevents teleporting to team home from specified worlds
#   - warp: Prevents teleporting to team warps from specified worlds
#   - enderchest: Prevents accessing team ender chest in specified worlds
#   - bank: Prevents using team bank in specified worlds
#
world_restrictions:
  enabled: true
  
  # List of worlds where specific features are disabled
  # Add world names exactly as they appear in your server
  disabled_worlds:
    # Prevent ender chest access in dangerous worlds
    enderchest:
      - "world_nether"
      - "world_the_end"
    # Prevent setting home in PvP/event worlds
    sethome:
      - "pvp_world"
      - "event_world"
    # Prevent creating warps in PvP/event worlds
    setwarp:
      - "pvp_world"
      - "event_world"
    # Prevent teleporting home from PvP/event worlds
    home:
      - "pvp_world"
      - "event_world"
    # Prevent teleporting to warps from PvP worlds
    warp:
      - "pvp_world"
    # Prevent bank access in creative worlds
    bank:
      - "creative_world"

# ────────────────────────────────────────────────────────────────────────────
#                      Feature Costs Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Configure costs for using team features.
# Supports both Vault economy and item-based costs.
#
feature_costs:
  enabled: true
  
  # Economy costs (requires Vault)
  economy:
    enabled: true
    
    # Cost for each feature usage
    team_creation: 0.0
    team_join: 0.0        # Cost for joining a team (invite accept, public join, join request accept)
    sethome: 100.0
    home: 50.0
    enderchest: 25.0
    setwarp: 200.0
    warp: 75.0
    bank_deposit: 0.0
    bank_withdraw: 10.0
    rename: 500.0
  
  # Permission-based join fees
  # When enabled, players can have different join fees based on permissions
  # Permission format: justteams.joinfee.<amount>
  # Example: justteams.joinfee.500 means player pays $500 to join any team
  # The highest permission value will be used
  # If disabled or no permission found, uses team_join cost above
  permission_based_join_fee:
    enabled: true
    max_fee: 10000.0      # Maximum join fee cap (prevents excessive permissions)
  
  # Item costs
  items:
    enabled: false
    
    # Item costs for each feature (format: "MATERIAL:AMOUNT")
    team_creation:
      - "DIAMOND:4"
    sethome:
      - "DIAMOND:2"
      - "EMERALD:1"
    home:
      - "ENDER_PEARL:1"
    enderchest:
      - "ENDER_CHEST:1"
    setwarp:
      - "DIAMOND:5"
      - "GOLD_INGOT:10"
    warp:
      - "GOLD_INGOT:2"
    
    # Whether to consume items on use (true) or just require them in inventory (false)
    consume_on_use: true

# ────────────────────────────────────────────────────────────────────────────
#                        Effects Configuration
# ────────────────────────────────────────────────────────────────────────────
#
# Configure sound and particle effects.
#
effects:
  sounds:
    enabled: true
    
    # General Sounds
    success: "BLOCK_NOTE_BLOCK_PLING"
    error: "BLOCK_NOTE_BLOCK_BASS"
    teleport: "BLOCK_BEACON_ACTIVATE"
    gui_open: "BLOCK_WOODEN_BUTTON_CLICK_ON"
    
    # Event Sounds
    team_created: "ENTITY_PLAYER_LEVELUP"
    team_disbanded: "BLOCK_NOTE_BLOCK_CHIME"
    member_join: "BLOCK_NOTE_BLOCK_HARP"
    member_leave: "BLOCK_NOTE_BLOCK_BELL"
    permission_change: "BLOCK_NOTE_BLOCK_FLUTE"
    warp_created: "BLOCK_NOTE_BLOCK_XYLOPHONE"
    warp_deleted: "BLOCK_NOTE_BLOCK_COW_BELL"
    home_set: "BLOCK_NOTE_BLOCK_GUITAR"
    bank_transaction: "BLOCK_NOTE_BLOCK_BIT"
    
  particles:
    teleport_warmup: "PORTAL"
    teleport_success: "END_ROD"

# ────────────────────────────────────────────────────────────────────────────
#                      Bedrock Edition Support
# ────────────────────────────────────────────────────────────────────────────
#
# Configure cross-platform support for Bedrock Edition players.
# Requires Floodgate plugin.
#
bedrock_support:
  enabled: true
  show_platform_indicators: true
  show_gamertags: true
  full_feature_support: true
  cross_platform_teams: true
  uuid_mode: "auto"

# ────────────────────────────────────────────────────────────────────────────
#                    Plugin Integrations
# ────────────────────────────────────────────────────────────────────────────
#
# Configure third-party plugin integrations for enhanced functionality.
#
integrations:
  # EternalCombat Integration
  # Prevents players from using team commands while in combat
  # Requires EternalCombat plugin: https://modrinth.com/plugin/eternalcombat
  eternalcombat:
    enabled: true
    # Block these actions while in combat
    prevent_teleport: true          # Prevent /team home and warp teleports
    prevent_leave: true              # Prevent leaving team
    prevent_disband: true            # Prevent disbanding team
    prevent_invite: true             # Prevent inviting players
    prevent_kick: true               # Prevent kicking members
    prevent_transfer: true           # Prevent transferring ownership
    prevent_bank_withdraw: true      # Prevent withdrawing from bank
    prevent_enderchest: true         # Prevent opening team enderchest
    prevent_settings_change: true    # Prevent changing team settings