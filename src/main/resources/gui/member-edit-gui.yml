      - "<gray>Trạng thái: <status>"
      - "<yellow>Chỉ xem - không thể chỉnh sửa</yellow>"
    usehome-permission-view:
      slot: 43
      material: ENDER_PEARL
      name: "<gray>ᴜsᴇ ᴛᴇᴀᴍ ʜᴏᴍᴇ</gray>"
